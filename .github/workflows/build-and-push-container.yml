# Build and Push Container Image
#
# Requires a GitHub Environment with the following variables:
#   ARCHES_PROJECT          - e.g. arches-myproject
#   ARCHES_PROJECT_PACKAGE  - e.g. arches_myproject
#   ECR_REPOSITORY          - e.g. myproject-ci-repository
#   AWS_ROLE                - e.g. arn:aws:iam::408807229061:role/my-github-role
#   AWS_REGION              - e.g. us-west-1
#
# And a repository secret:
#   FARGEO_PAT  - GitHub PAT with read access to fargeo/arches-docker

name: Build and Push Container Image to CI Environment

on:
    push:
        branches:
            - "deploy"
            - "test/*"
    repository_dispatch:
        types:
            - deploy_project
    workflow_dispatch:

permissions:
    id-token: write
    contents: read

jobs:
    build:
        name: Build (${{ matrix.slug }})
        runs-on: ${{ matrix.runner }}
        environment: ci
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: linux/amd64
                      runner: ubuntu-latest
                      slug: amd64
                    - platform: linux/arm64
                      runner: ubuntu-24.04-arm
                      slug: arm64
        steps:
            - name: Checkout project
              uses: actions/checkout@v5
              with:
                  path: project

            - name: Checkout arches-docker
              uses: actions/checkout@v5
              with:
                  repository: fargeo/arches-docker
                  ref: main
                  token: ${{ secrets.FARGEO_PAT }}
                  path: arches-docker

            - name: Prepare build context
              run: |
                  cp arches-docker/entrypoint.sh project/docker/entrypoint.sh
                  cp arches-docker/supervisor.conf project/docker/supervisor.conf
                  cp arches-docker/settings_local.py project/docker/settings_local.py
                  cp -r arches-docker/conf.d project/docker/
                  cp -r arches-docker/nginx project/docker/

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v5.1.1
              with:
                  role-to-assume: ${{ vars.AWS_ROLE }}
                  aws-region: ${{ vars.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push by digest
              id: build
              uses: docker/build-push-action@v6
              with:
                  context: ./project
                  file: arches-docker/production/Dockerfile.alpine
                  platforms: ${{ matrix.platform }}
                  outputs: type=image,name=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }},push-by-digest=true,name-canonical=true,push=true
                  build-args: |
                      ARCHES_PROJECT=${{ vars.ARCHES_PROJECT }}
                      ARCHES_PROJECT_PACKAGE=${{ vars.ARCHES_PROJECT_PACKAGE }}

            - name: Export digest
              run: |
                  mkdir -p /tmp/digests
                  digest="${{ steps.build.outputs.digest }}"
                  touch "/tmp/digests/${digest#sha256:}"

            - name: Upload digest
              uses: actions/upload-artifact@v4
              with:
                  name: digest-${{ matrix.slug }}
                  path: /tmp/digests/*
                  if-no-files-found: error
                  retention-days: 1

    merge:
        name: Merge manifests
        runs-on: ubuntu-latest
        environment: ci
        needs: build
        steps:
            - name: Download digests
              uses: actions/download-artifact@v4
              with:
                  path: /tmp/digests
                  pattern: digest-*
                  merge-multiple: true

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v5.1.1
              with:
                  role-to-assume: ${{ vars.AWS_ROLE }}
                  aws-region: ${{ vars.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Create and push manifest list
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  REPO="${ECR_REGISTRY}/${{ vars.ECR_REPOSITORY }}"
                  docker buildx imagetools create \
                    -t "${REPO}:${IMAGE_TAG}" \
                    $(printf "${REPO}@sha256:%s " $(ls /tmp/digests/))
