# Build and Push Container Image
#
# Triggered by pushing to a deploy branch: deploy/<environment>
# The branch suffix must match a GitHub Environment configured on this repo.
#
# Each GitHub Environment requires the following variables:
#   ECR_REPOSITORY  - e.g. mysite-repository
#   AWS_ROLE        - e.g. arn:aws:iam::123456789012:role/my-github-role
#   AWS_REGION      - e.g. us-west-1
#
# The following must be set as repository-level variables (not environment-scoped):
#   ARCHES_PROJECT          - e.g. arches-myproject
#   ARCHES_PROJECT_PACKAGE  - e.g. arches_myproject
#
# And a repository secret:
#   FARGEO_PAT  - GitHub PAT with read access to fargeo/arches-docker

name: Build and Push Container Image

on:
  push:
    branches:
      - "deploy/*"

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.name }}
    steps:
      - name: Extract environment from branch
        id: env
        run: echo "name=${GITHUB_REF_NAME#deploy/}" >> $GITHUB_OUTPUT

  build:
    name: Build (${{ matrix.slug }})
    needs: setup
    runs-on: ${{ matrix.runner }}
    environment: ${{ needs.setup.outputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            slug: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            slug: arm64
    steps:
      - name: Checkout project
        uses: actions/checkout@v5
        with:
          path: project

      - name: Checkout arches-docker
        uses: actions/checkout@v5
        with:
          repository: fargeo/arches-docker
          ref: main
          token: ${{ secrets.FARGEO_PAT }}
          path: arches-docker

      - name: Prepare build context
        run: |
          cp arches-docker/entrypoint.sh project/docker/entrypoint.sh
          cp arches-docker/supervisor.conf project/docker/supervisor.conf
          cp arches-docker/settings_local.py project/docker/settings_local.py
          cp -r arches-docker/conf.d project/docker/
          cp -r arches-docker/nginx project/docker/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./project
          file: arches-docker/production/Dockerfile.alpine
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:cache-${{ matrix.slug }}
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:cache-${{ matrix.slug }},mode=max
          build-args: |
            ARCHES_PROJECT=${{ vars.ARCHES_PROJECT }}
            ARCHES_PROJECT_PACKAGE=${{ vars.ARCHES_PROJECT_PACKAGE }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifests
    runs-on: ubuntu-latest
    needs: [setup, build]
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push manifest list
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          REPO="${ECR_REGISTRY}/${{ vars.ECR_REPOSITORY }}"
          docker buildx imagetools create \
            -t "${REPO}:${IMAGE_TAG}" \
            $(printf "${REPO}@sha256:%s " $(ls /tmp/digests/))
